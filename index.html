<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root{
    --ink: #1c1a16;
    --ink-soft: #55524a;
    --line-grey: #b7b1a2;
    --line-grey-soft: #e2ddd0;
    --rubric: #8a2e26;
    --hl: #f5e05a;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:#ffffff;
    color:var(--ink);
    font-family:'Times New Roman', Times, serif;
    overflow:hidden;
  }
  a{ color:inherit; }

  /* ---------------- Header ---------------- */
  header{
    position:relative;
    z-index:50;
    height:30px;
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--line-grey-soft);
    padding:0 20px;
  }
  header .brand{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    font-size:16px;
    letter-spacing:0.08em;
    white-space:nowrap;
  }
  header nav{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
  }
  header nav a{
    cursor:pointer;
    padding-bottom:3px;
    border-bottom:1px solid transparent;
    white-space:nowrap;
    transition:border-color .3s ease, color .3s ease;
  }
  header nav a:hover,
  header nav a.active{
    color:var(--rubric);
    border-color:var(--rubric);
  }
  header .spacer{ flex:1 1 0%; }

  @media (max-width:700px){
    header .brand{ font-size:14px; }
    header nav{ gap:34px; justify-content:flex-end; padding-right:4px; }
  }

  main{ height:calc(100vh - 30px); position:relative; }

  .view{ position:absolute; inset:0; display:none; }
  .view.active{ display:block; }

  .label{
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--rubric);
    margin-bottom:12px;
    text-align:center;
  }

  /* ---------------- Hall of Saints — carousel ---------------- */
  #hall-track{
    height:100%;
    display:flex;
    align-items:flex-start;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #hall-track::-webkit-scrollbar{ display:none; }
  #hall-status{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-style:italic; color:var(--ink-soft); font-size:14px;
  }

  .saint-item{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:10px;
    margin-bottom:40px;
    cursor:pointer;
    transition:opacity 1s ease;
  }
  .saint-item.dim{ opacity:0; pointer-events:none; }

  .saint-card{
    flex:0 0 auto;
    height:calc(100vh - 104px);
    aspect-ratio:1/2.4;
    overflow:hidden;
    background:#fdfdfc;
  }
  .saint-card img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none; /* suppress the browser's built-in image-hover search icon */
  }

  .saint-caption{
    margin-top:10px;
    font-size:11px;
    line-height:14px;
    letter-spacing:0.08em;
    text-align:center;
    text-transform:uppercase;
    color:var(--ink-soft);
    transition:color .3s ease;
  }
  .saint-item:hover .saint-caption{ color:var(--rubric); }

  .saint-item.selected{ position:fixed; z-index:40; margin:0; }
  .saint-item.selected .saint-card{ box-shadow:none !important; }
  .item-placeholder{ flex:0 0 auto; visibility:hidden; }

  /* ---------------- Hall Modal — desktop split panel ---------------- */
  #hall-modal-quotes, #hall-modal-text{
    position:fixed;
    top:0; height:100%; width:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity 1s ease;
    z-index:41;
    pointer-events:none;
  }
  #hall-modal-quotes{ left:0; }
  #hall-modal-text{ right:0; }
  #hall-modal-quotes.reveal, #hall-modal-text.reveal{ opacity:1; pointer-events:auto; }

  .quotes-viewport{
    position:relative;
    width:min(320px, 80vw);
    height:308px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
  }
  .quotes-viewport.small{ height:110px; }
  .quotes-track{
    display:flex;
    flex-direction:column;
    height:100%;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .quotes-track::-webkit-scrollbar{ display:none; }
  .quotes-track .q{
    flex:0 0 auto;
    height:44px;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-style:italic;
    font-size:14px;
    color:var(--ink-soft);
    padding:0 14px;
    border-bottom:1px solid var(--line-grey-soft);
    cursor:pointer;
    transition:color .3s ease;
  }
  .quotes-track .q:hover{ color:var(--rubric); }
  .quotes-viewport.small .q{ height:32px; font-size:11.5px; }

  .chapters-panel{
    width:min(420px, 80vw);
    max-height:70vh;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .chapters-panel::-webkit-scrollbar{ display:none; }
  .chapter-header{
    display:block; width:100%; text-align:left;
    background:#fff; border:none; font-family:inherit;
    font-size:14px; letter-spacing:0.03em;
    color:var(--ink); cursor:pointer;
    padding:10px 4px; border-bottom:1px solid var(--line-grey-soft);
    transition:color .3s ease;
  }
  .chapter-header:hover{ color:var(--rubric); }
  .chapter.revealed .chapter-header{
    position:sticky; top:0; z-index:2;
  }
  .chapter-body{ display:none; font-size:15px; line-height:1.7; color:var(--ink-soft); padding:12px 4px 26px 4px; }
  .chapter-body p{ margin-bottom:1em; }
  .chapter.revealed .chapter-body{ display:block; }
  .chapter-start-sentinel, .chapter-end-sentinel{ height:1px; }
  .chapters-panel.has-open .chapter:not(.revealed){ display:none; }
  .quote-anchor{ transition:background-color 1s ease; border-radius:2px; }
  .quote-anchor.hl{ background-color:var(--hl); transition:background-color .2s ease; cursor:pointer; }

  #hall-close{
    position:fixed; top:44px; right:6vw; z-index:42;
    width:34px; height:34px;
    border:1px solid var(--line-grey);
    background:#fff;
    display:none; align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .3s ease, transform .3s ease;
  }
  #hall-close.show{ display:flex; }
  #hall-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  /* ---------------- Hall Modal — compact (mobile-style) layout ----------------
     Driven by body.modal-compact, toggled in JS based on available width
     rather than a fixed viewport breakpoint — see isModalCompact(). This is
     deliberately separate from the header's own @media(max-width:700px). */
  #hall-mobile-panel{ display:none; }
  body.modal-compact #hall-modal-quotes, body.modal-compact #hall-modal-text{ display:none; }
  body.modal-compact #hall-mobile-panel{
    display:block;
    position:fixed; inset:0;
    padding-top:40vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    z-index:35;
    background:#fff;
  }
  body.modal-compact #hall-mobile-panel.reveal{ opacity:1; pointer-events:auto; }

  .mobile-hero-bar{
    position:sticky; top:0; z-index:2;
    background:#fff;
    border-bottom:1px solid var(--line-grey-soft);
    display:flex; align-items:center;
    padding:8px 44px 8px 12px;
    min-height:56px;
    transition:min-height .3s ease;
  }
  .mobile-hero-bar.minimized .quotes-viewport.small{ display:none; }
  .mobile-hero-bar .quotes-viewport.small{ flex:1; margin:0; width:auto; }
  .mobile-dock-thumb{
    width:34px; height:50px; flex:0 0 auto; margin-right:10px;
    overflow:hidden; background:#fdfdfc; opacity:0; transition:opacity .3s ease;
  }
  .mobile-dock-thumb img{ width:100%; height:100%; object-fit:contain; pointer-events:none; }
  .mobile-hero-bar.docked .mobile-dock-thumb{ opacity:1; }
  .mobile-arrow{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:26px; height:26px; border:1px solid var(--line-grey);
    background:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .3s ease, border-color .3s ease;
  }
  .mobile-hero-bar.minimized .mobile-arrow{ transform:translateY(-50%) rotate(180deg); }
  .mobile-arrow:hover{ border-color:var(--rubric); }

  .mobile-chapters{ padding:18px 18px 70px 18px; }
  .mobile-chapters .chapters-panel{ width:100%; max-height:none; overflow:visible; }
  .mobile-chapters .chapter.revealed .chapter-header{ top:56px; }

  /* ---------------- Armory ---------------- */
  #armory-track{
    height:100%;
    display:flex;
    align-items:center;
    gap:14px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #armory-track::-webkit-scrollbar{ display:none; }

  .spear{
    flex:0 0 auto;
    width:54px;
    height:calc(100vh - 100px);
    margin-top:10px; margin-bottom:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:14px;
    cursor:pointer;
    position:relative;
    transition:opacity 1s ease;
  }
  .spear .hilt{ display:flex; flex-direction:column; align-items:center; gap:3px; flex:0 0 auto; }
  .spear .hilt .pommel{ width:6px; height:6px; border-radius:50%; background:var(--line-grey); transition:background-color .4s ease; }
  .spear .hilt .grip{ width:1.5px; height:9px; background:var(--line-grey); transition:background-color .4s ease; }
  .spear .hilt .guard{ width:24px; height:1.5px; background:var(--line-grey); transition:background-color .4s ease; }
  .spear:hover .hilt .pommel, .spear:hover .hilt .grip, .spear:hover .hilt .guard{ background:var(--rubric); }

  .spear .shaft-text{
    writing-mode:vertical-rl;
    text-orientation:sideways; /* 'mixed' keeps quote marks upright per the Unicode table — force everything to rotate together */
    font-style:italic;
    font-size:13px;
    color:var(--ink-soft);
    flex:1;
    overflow:hidden;
    letter-spacing:0.02em;
    margin-top:10px;
    transition:color .3s ease;
  }
  .spear:hover .shaft-text{ color:var(--ink); }
  .spear.dim{ opacity:0; pointer-events:none; }
  .spear.selected{ position:fixed; z-index:40; margin:0; padding-top:0; background:#fff; transform-origin:center center; }
  .spear.selected .hilt{ display:none; }
  .spear-placeholder{ flex:0 0 auto; visibility:hidden; }

  #armory-attribution{
    position:fixed; left:50%; transform:translateX(-50%);
    top:calc(50% + 60px); z-index:41;
    font-style:italic; font-size:14px; color:var(--ink-soft);
    text-align:center; opacity:0; transition:opacity 1s ease; white-space:nowrap;
  }
  #armory-attribution.reveal{ opacity:1; }
  #armory-attribution a{ border-bottom:1px solid var(--rubric); color:var(--rubric); text-decoration:none; }

  #armory-close{
    position:fixed; top:44px; right:6vw; z-index:42;
    width:34px; height:34px; border:1px solid var(--line-grey);
    background:#fff; display:none; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color .3s ease, transform .3s ease;
  }
  #armory-close.show{ display:flex; }
  #armory-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  @media (prefers-reduced-motion:reduce){ *{ transition-duration:0.01ms !important; } }
</style>
</head>
<body>

<header>
  <div class="brand">Test</div>
  <nav>
    <a data-view="hall" class="active">Hall of Saints</a>
    <a data-view="armory">Armory</a>
  </nav>
  <div class="spacer"></div>
</header>

<main>

  <!-- ===================== HALL OF SAINTS ===================== -->
  <section id="hall-view" class="view active">
    <div id="hall-track"></div>
    <div id="hall-status" style="display:none"></div>
    <div id="data-source-badge" style="display:none;position:absolute;bottom:8px;left:12px;font-size:10px;color:var(--ink-soft);letter-spacing:0.05em;z-index:5;"></div>

    <div id="hall-modal-quotes">
      <div>
        <div class="label">Key Sayings</div>
        <div class="quotes-viewport"><div class="quotes-track" id="hall-quotes-track-desktop"></div></div>
      </div>
    </div>
    <div id="hall-modal-text">
      <div class="chapters-panel" id="hall-chapters-desktop"></div>
    </div>

    <div id="hall-mobile-panel">
      <div class="mobile-hero-bar" id="mobile-hero-bar">
        <div class="mobile-dock-thumb" id="mobile-dock-thumb"><img id="mobile-dock-img" alt=""></div>
        <div class="quotes-viewport small"><div class="quotes-track" id="hall-quotes-track-mobile"></div></div>
        <div class="mobile-arrow" id="mobile-hero-arrow">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 3 L5 7 L9 3" stroke="var(--ink)" stroke-width="1.3" fill="none"/></svg>
        </div>
      </div>
      <div class="mobile-chapters">
        <div class="chapters-panel" id="hall-chapters-mobile"></div>
      </div>
    </div>

    <div id="hall-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

  <!-- ===================== ARMORY ===================== -->
  <section id="armory-view" class="view">
    <div id="armory-track"></div>
    <div id="armory-attribution"></div>
    <div id="armory-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

</main>

<script>
/* =====================================================================
   CONFIG — fill these in with your actual repo details. Without them,
   the site can't ask GitHub what folders exist under assets/saints/,
   and falls back to a small built-in demo so the page still works.
===================================================================== */
const GITHUB_OWNER  = 'simonandpeter';
const GITHUB_REPO   = 'test';
const GITHUB_BRANCH = 'main';

/* The desktop split-panel modal layout (two 420px/320px-ish fixed panels
   either side of the enlarged card) needs real room to breathe. Below this
   width the panels start to crowd the centred card, so we switch to the
   compact single-column layout — independent of the header's own 700px
   breakpoint, since this is about panel geometry, not device type. */
/* The desktop split-panel modal layout needs real room: the chapters
   panel maxes out at 420px, centred in the right half, and must clear
   the centred card. Rather than guess a fixed pixel breakpoint (which
   was wrong — overlap actually starts much wider than expected once the
   card's own width is accounted for), compute directly whether they'd
   collide at the current window size. */
function isModalCompact(origRect) {
  const availH = window.innerHeight - HEADER_H;
  const targetH = availH * 0.62;
  const scale = targetH / origRect.height;
  const targetW = origRect.width * scale;
  const chaptersPanelHalf = 210; // half of the 420px chapters panel
  const buffer = 60;
  const neededWidth = 4 * chaptersPanelHalf + 2 * targetW + buffer;
  return window.innerWidth < neededWidth;
}

/* =====================================================================
   NAV
===================================================================== */
document.querySelectorAll('header nav a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('header nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    const target = a.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`${target}-view`).classList.add('active');
  });
});

/* =====================================================================
   TWEEN — every position/rotation/scale animation in this file runs
   through this. No CSS transitions on those properties anywhere —
   see the note at the bottom of the file for why.
===================================================================== */
function tween(duration, onFrame, onComplete) {
  const ease = t => 1 - Math.pow(1 - t, 3);
  const start = performance.now();
  function step(now) {
    const raw = Math.min(1, (now - start) / duration);
    onFrame(ease(raw), raw);
    if (raw < 1) requestAnimationFrame(step);
    else if (onComplete) onComplete();
  }
  requestAnimationFrame(step);
}
function lerp(a, b, t) { return a + (b - a) * t; }

/* =====================================================================
   SHARED — smooth wheel-to-scroll with seamless infinite looping.
   One implementation, used by the Hall track, the Armory track, and
   the vertical quote carousels (axis:'y').
===================================================================== */
function attachLoopScroll(trackEl, bufferCount, getItemCount, opts = {}) {
  const axis = opts.axis || 'x';
  const easeFactor = opts.easeFactor ?? 0.16;
  const scrollProp = axis === 'x' ? 'scrollLeft' : 'scrollTop';
  const offsetProp = axis === 'x' ? 'offsetLeft' : 'offsetTop';

  let targetScroll = 0;
  let isEasing = false;
  let raf = null;
  let stride = 0;

  function measure() {
    const a = trackEl.children[bufferCount];
    const b = trackEl.children[bufferCount + 1];
    const newStride = (a && b) ? (b[offsetProp] - a[offsetProp]) : 0;
    if (stride && newStride && stride !== newStride) {
      // item size changed (e.g. window resized) — rescale the current
      // position by the same ratio so it stays valid instead of drifting
      // further from reality with every resize until scrolling wedges
      const ratio = newStride / stride;
      trackEl[scrollProp] = trackEl[scrollProp] * ratio;
      targetScroll = targetScroll * ratio;
    }
    stride = newStride;
  }

  function checkLoop() {
    const count = getItemCount();
    if (!stride || !count) return;
    const headSpan = bufferCount * stride;
    const bodySpan = count * stride;
    const pos = trackEl[scrollProp];
    if (pos < headSpan - stride * (bufferCount - 1)) {
      trackEl[scrollProp] += bodySpan;
      targetScroll += bodySpan;
    } else if (pos > headSpan + bodySpan) {
      trackEl[scrollProp] -= bodySpan;
      targetScroll -= bodySpan;
    }
  }

  function tick() {
    const current = trackEl[scrollProp];
    const diff = targetScroll - current;
    if (Math.abs(diff) < 0.5) {
      trackEl[scrollProp] = targetScroll;
      isEasing = false;
      raf = null;
      checkLoop();
      return;
    }
    trackEl[scrollProp] = current + diff * easeFactor;
    checkLoop();
    raf = requestAnimationFrame(tick);
  }

  trackEl.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
    e.preventDefault();
    if (axis === 'y') e.stopPropagation();
    targetScroll += e.deltaY;
    isEasing = true;
    if (!raf) raf = requestAnimationFrame(tick);
  }, { passive: false });

  trackEl.addEventListener('scroll', () => {
    if (isEasing) return;
    targetScroll = trackEl[scrollProp];
    checkLoop();
  });

  return {
    measure,
    resetTo(value) { trackEl[scrollProp] = value; targetScroll = value; }
  };
}

/* Idle auto-scroll, deliberately kept separate from attachLoopScroll above.
   It only ever does one thing — nudge scrollLeft forward — and relies on
   attachLoopScroll's own 'scroll' listener (already attached to the same
   element) to pick up the change and handle the infinite-loop wrap, the
   same way it already reacts to any other scroll. No shared flags between
   the two, so there's nothing for this to get stuck fighting over. */
function attachIdleDrift(trackEl, opts = {}) {
  const idleMs = opts.idleMs ?? 5000;
  const speed = opts.speed ?? 22; // px/s, constant from the first frame — no ramp-in

  let lastInteraction = performance.now();
  let paused = false;
  let active = false;
  let pos = null;
  let lastFrame = performance.now();

  function markInteraction() {
    lastInteraction = performance.now();
    active = false;
    pos = null;
  }
  trackEl.addEventListener('wheel', markInteraction, { passive: true });
  // touch gestures never fire 'wheel' — without these, drift had no way to
  // know mobile scrolling was happening at all, and kept nudging scrollLeft
  // on top of it, fighting the user's own touch-scroll.
  trackEl.addEventListener('touchstart', markInteraction, { passive: true });
  trackEl.addEventListener('touchmove', markInteraction, { passive: true });

  function frame(now) {
    const dt = Math.min(now - lastFrame, 50);
    lastFrame = now;
    if (!paused) {
      const idleFor = now - lastInteraction;
      if (idleFor > idleMs) {
        if (!active) { active = true; pos = trackEl.scrollLeft; }
        pos += speed * (dt / 1000);
        trackEl.scrollLeft = pos;
      } else if (active) {
        active = false;
        pos = null;
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  return {
    pause() { paused = true; active = false; pos = null; },
    resume() { paused = false; lastInteraction = performance.now(); }
  };
}

function cyclicSlice(list, start, count) {
  const out = [];
  const n = list.length;
  for (let i = 0; i < count; i++) out.push(list[((start + i) % n + n) % n]);
  return out;
}

/* items: [{text, ...}]; onItemClick receives the item */
/* Attaches the scroll loop exactly ONCE per container. Re-rendering the
   same carousel repeatedly (e.g. opening a new saint's modal) must reuse
   this, not call attachLoopScroll again — every call adds its own
   wheel/scroll listeners to the same persistent DOM node, and several of
   them competing for the same scrollTop is what eventually broke this. */
function createQuoteCarousel(containerEl, rows) {
  const buffer = Math.max(rows, 24); // generous, so fast wheel-flicks never outrun the clone buffer (same fix as the Armory rack)
  let items = [];
  const loop = attachLoopScroll(containerEl, buffer, () => items.length, { axis: 'y' });

  function render(newItems, onItemClick) {
    items = newItems;
    containerEl.innerHTML = '';
    if (!items.length) return;
    const head = cyclicSlice(items, items.length - buffer, buffer);
    const tail = cyclicSlice(items, 0, buffer);
    const full = [...head, ...items, ...tail];
    full.forEach(item => {
      const el = document.createElement('div');
      el.className = 'q';
      el.textContent = `\u201C${item.text}\u201D`;
      if (onItemClick) el.addEventListener('click', (e) => { e.stopPropagation(); onItemClick(item); });
      containerEl.appendChild(el);
    });
    requestAnimationFrame(() => {
      loop.measure();
      const first = containerEl.children[buffer];
      if (first) loop.resetTo(first.offsetTop);
    });
  }

  return { render };
}

/* =====================================================================
   DATA — one folder per saint under assets/saints/, auto-discovered
   via the GitHub API (one call lists the whole repo tree). For each
   folder: the first image file becomes the card art, quotes.txt (one
   quote per line) becomes the key sayings, and every other .txt file
   becomes a chapter — ordered numerically by the number at the start
   of its filename (so "11." sorts after "9.", not between "1." and
   "2."). Add a folder, the carousel picks it up automatically.
===================================================================== */
function naturalCompare(a, b) {
  const na = parseInt((a.match(/^\d+/) || ['999999'])[0], 10);
  const nb = parseInt((b.match(/^\d+/) || ['999999'])[0], 10);
  if (na !== nb) return na - nb;
  return a.localeCompare(b);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* Wraps exact substring matches in <span class="quote-anchor" data-idx="n">
   so a click on the matching carousel quote can scrollIntoView + highlight
   it directly, with no runtime text-searching at click time. */
function buildChapterHtml(rawBody, anchors) {
  let html = '';
  let cursor = 0;
  [...anchors].sort((a, b) => a.offset - b.offset).forEach(a => {
    html += escapeHtml(rawBody.slice(cursor, a.offset));
    const chunk = rawBody.slice(a.offset, a.offset + a.length);
    html += `<span class="quote-anchor" data-idx="${a.quoteIndex}">${escapeHtml(chunk)}</span>`;
    cursor = a.offset + a.length;
  });
  html += escapeHtml(rawBody.slice(cursor));
  return html.split(/\n{2,}/).map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');
}

/* For each quote, find the first chapter containing it verbatim. Quotes
   with no exact match anywhere are dropped from the carousel entirely
   (per spec — no link, no display). */
function linkQuotesToChapters(quoteLines, chapters) {
  const linked = [];
  quoteLines.forEach((text) => {
    for (let ci = 0; ci < chapters.length; ci++) {
      const offset = chapters[ci].body.indexOf(text);
      if (offset !== -1) {
        linked.push({ text, chapterIndex: ci, offset });
        break;
      }
    }
  });
  return linked.map((lq, i) => ({ ...lq, quoteIndex: i }));
}

async function fetchText(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`fetch failed: ${url}`);
  return res.text();
}

async function loadSaints() {
  if (GITHUB_OWNER === 'YOUR_GITHUB_USERNAME' || GITHUB_REPO === 'YOUR_REPO_NAME') {
    console.warn('GITHUB_OWNER/GITHUB_REPO are not configured — showing the built-in demo. Fill them in at the top of the script.');
    return { saints: fallbackSaints(), source: 'unconfigured' };
  }
  try {
    const treeUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;
    const treeRes = await fetch(treeUrl);
    if (!treeRes.ok) throw new Error(`GitHub API returned ${treeRes.status} for ${treeUrl}`);
    const tree = await treeRes.json();

    const folders = {};
    tree.tree
      .filter(item => item.type === 'blob' && item.path.startsWith('assets/saints/'))
      .forEach(item => {
        const rel = item.path.slice('assets/saints/'.length);
        const slash = rel.indexOf('/');
        if (slash === -1) return;
        const folder = rel.slice(0, slash);
        const file = rel.slice(slash + 1);
        if (file.includes('/')) return; // ignore nested subfolders
        (folders[folder] = folders[folder] || []).push(file);
      });

    if (!Object.keys(folders).length) {
      console.warn(`No files found under assets/saints/ in ${GITHUB_OWNER}/${GITHUB_REPO}@${GITHUB_BRANCH}. Check the path and branch name.`);
      return { saints: fallbackSaints(), source: 'empty' };
    }

    const saints = [];
    const skipped = [];
    for (const folder of Object.keys(folders).sort()) {
      const files = folders[folder];
      const image = files.find(f => /\.(jpe?g|png|webp)$/i.test(f));
      const quotesFile = files.find(f => f.toLowerCase() === 'quotes.txt');
      const chapterFiles = files.filter(f => /\.txt$/i.test(f) && f.toLowerCase() !== 'quotes.txt').sort(naturalCompare);
      if (!image) { skipped.push(folder); continue; }

      const base = `assets/saints/${encodeURIComponent(folder)}/`;
      const quotesRaw = quotesFile ? await fetchText(base + encodeURIComponent(quotesFile)).catch(() => '') : '';
      const quoteLines = quotesRaw.split('\n').map(l => l.trim()).filter(Boolean);

      const chapters = [];
      for (const cf of chapterFiles) {
        const body = await fetchText(base + encodeURIComponent(cf)).catch((e) => { console.warn(`Could not fetch ${base}${cf}:`, e); return ''; });
        chapters.push({ title: cf.replace(/\.txt$/i, ''), body: body.trim() });
      }

      saints.push({
        id: folder,
        name: folder,
        image: base + encodeURIComponent(image),
        chapters,
        linkedQuotes: linkQuotesToChapters(quoteLines, chapters)
      });
    }
    if (skipped.length) console.warn('Skipped folders with no image file:', skipped);
    if (!saints.length) return { saints: fallbackSaints(), source: 'empty' };
    return { saints, source: 'live' };
  } catch (err) {
    console.warn('Falling back to the built-in demo saints — GitHub fetch failed:', err);
    return { saints: fallbackSaints(), source: 'error' };
  }
}

/* ---- chapter accordion (shared by desktop + mobile panels) ---- */
/* Chapters progressively reveal as the reader scrolls near the end of the
   current one (watched via a sentinel at the bottom of each chapter body),
   rather than being an exclusive one-at-a-time accordion. Each revealed
   chapter's header is sticky, so as the reader scrolls into the next
   chapter, its header naturally covers the previous one — no extra JS
   needed for that part, it's just how stacked position:sticky works.
   Scrolling back up to the start of the first-revealed chapter reveals
   the one before it, mirroring the forward behaviour. */
function createChapterController(container, getScrollRoot) {
  let firstOpen = null;
  let revealedUpTo = -1;
  let nextObserver = null;
  let prevObserver = null;

  // Clicking the highlighted quote itself clears it. Attached once here
  // (not inside render()) so repeated renders don't accumulate listeners.
  container.addEventListener('click', (e) => {
    const anchor = e.target.closest('.quote-anchor');
    if (anchor && anchor.classList.contains('hl')) {
      anchor.classList.remove('hl');
      if (currentHighlightEl === anchor) currentHighlightEl = null;
    }
  });

  function applyVisibility() {
    container.querySelectorAll('.chapter').forEach(ch => {
      const i = Number(ch.dataset.i);
      ch.classList.toggle('revealed', firstOpen !== null && i >= firstOpen && i <= revealedUpTo);
    });
    container.classList.toggle('has-open', firstOpen !== null);
  }

  function disconnectNext() { if (nextObserver) { nextObserver.disconnect(); nextObserver = null; } }
  function disconnectPrev() { if (prevObserver) { prevObserver.disconnect(); prevObserver = null; } }
  function disconnectAll() { disconnectNext(); disconnectPrev(); }

  function watchNext() {
    disconnectNext();
    const chapters = container.querySelectorAll('.chapter');
    if (revealedUpTo < 0 || revealedUpTo >= chapters.length - 1) return;
    const current = container.querySelector(`.chapter[data-i="${revealedUpTo}"]`);
    const sentinel = current && current.querySelector('.chapter-end-sentinel');
    if (!sentinel) return;
    nextObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          revealedUpTo = Math.min(revealedUpTo + 1, chapters.length - 1);
          applyVisibility();
          watchNext();
        }
      });
    }, { root: getScrollRoot(), threshold: 0.01 });
    nextObserver.observe(sentinel);
  }

  // Position of `el`'s top edge within `root`'s scrollable content,
  // independent of `el`'s offsetParent chain (which is often some other
  // positioned ancestor, not the scroll container itself — offsetTop
  // alone gave the wrong coordinate space here).
  function scrollOffsetWithin(el, root) {
    return el.getBoundingClientRect().top - root.getBoundingClientRect().top + root.scrollTop;
  }

  function watchPrev() {
    disconnectPrev();
    if (firstOpen === null || firstOpen <= 0) return;
    const current = container.querySelector(`.chapter[data-i="${firstOpen}"]`);
    const sentinel = current && current.querySelector('.chapter-start-sentinel');
    if (!sentinel) return;
    prevObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const root = getScrollRoot();
          const beforeHeight = root.scrollHeight;
          const beforeScroll = root.scrollTop;
          firstOpen = Math.max(0, firstOpen - 1);
          applyVisibility();
          // revealing the previous chapter inserts its height above the
          // current view — compensate scrollTop by the same amount so the
          // content on screen doesn't jump, and the reveal feels like a
          // continuous scroll rather than a snap to the new chapter's top
          const grew = root.scrollHeight - beforeHeight;
          root.scrollTop = beforeScroll + grew;
          watchPrev();
        }
      });
    }, { root: getScrollRoot(), threshold: 0.01 });
    prevObserver.observe(sentinel);
  }

  function openFrom(index) {
    firstOpen = index;
    revealedUpTo = index;
    applyVisibility();
    watchNext();
    watchPrev();
    const chapterEl = container.querySelector(`.chapter[data-i="${index}"]`);
    const root = getScrollRoot();
    if (chapterEl && root) root.scrollTop = scrollOffsetWithin(chapterEl, root);
  }

  function close() {
    firstOpen = null;
    revealedUpTo = -1;
    disconnectAll();
    applyVisibility();
  }

  function render(chapters) {
    close();
    container.innerHTML = '';
    chapters.forEach((ch, i) => {
      const el = document.createElement('div');
      el.className = 'chapter';
      el.dataset.i = i;
      el.innerHTML = `<div class="chapter-start-sentinel"></div><button class="chapter-header" type="button">${ch.title}</button><div class="chapter-body">${ch.html}<div class="chapter-end-sentinel"></div></div>`;
      el.querySelector('.chapter-header').addEventListener('click', () => {
        if (el.classList.contains('revealed')) close();
        else openFrom(i);
      });
      container.appendChild(el);
    });
  }

  return { render, openFrom, close };
}

let currentHighlightEl = null;
function jumpToQuote(linkedQuote) {
  const compact = currentHallOpen ? isModalCompact(currentHallOpen.origRect) : true;
  const container = compact
    ? document.getElementById('hall-chapters-mobile')
    : document.getElementById('hall-chapters-desktop');
  const controller = compact ? hallChaptersMobile : hallChaptersDesktop;
  controller.openFrom(linkedQuote.chapterIndex);

  requestAnimationFrame(() => {
    const anchor = container.querySelector(`.quote-anchor[data-idx="${linkedQuote.quoteIndex}"]`);
    if (!anchor) return;
    if (currentHighlightEl && currentHighlightEl !== anchor) currentHighlightEl.classList.remove('hl');

    const scrollBox = compact ? document.getElementById('hall-mobile-panel') : container;
    const anchorTop = anchor.getBoundingClientRect().top - scrollBox.getBoundingClientRect().top + scrollBox.scrollTop;
    const targetTop = anchorTop - (scrollBox.clientHeight / 2) + (anchor.offsetHeight / 2);
    const startTop = scrollBox.scrollTop;
    tween(1000, t => { scrollBox.scrollTop = lerp(startTop, targetTop, t); }, () => {
      anchor.classList.add('hl');
      currentHighlightEl = anchor;
    });
  });
}

const HEADER_H = 30;
let currentHallOpen = null; // { itemEl, origRect } while a Hall modal is open
let modalCompactMode = null; // tracks compact vs split-panel while a Hall modal is open

function computeHallTarget(origRect, mobile) {
  const targetH = mobile ? window.innerHeight * 0.36 : (window.innerHeight - HEADER_H) * 0.62;
  const scale = targetH / origRect.height;
  const targetW = origRect.width * scale;
  const targetTop = origRect.top; // stay exactly where it was in the deck — only move horizontally
  const targetLeft = mobile
    ? window.innerWidth * 0.66 - targetW / 2
    : (window.innerWidth - targetW) / 2;
  return { targetH, targetW, targetTop, targetLeft, scale };
}

function openHallModal(itemEl, data) {
  hallDrift.pause();
  const rect = itemEl.getBoundingClientRect();
  const compact = isModalCompact(rect);
  modalCompactMode = compact;
  document.body.classList.toggle('modal-compact', compact);

  const placeholder = document.createElement('div');
  placeholder.className = 'item-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(itemEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(itemEl).marginBottom;
  itemEl.after(placeholder);

  hallTrack.querySelectorAll('.saint-item').forEach(el => { if (el !== itemEl) el.classList.add('dim'); });

  itemEl.style.top = rect.top + 'px';
  itemEl.style.left = rect.left + 'px';
  itemEl.style.width = rect.width + 'px';
  itemEl.style.height = rect.height + 'px';
  itemEl.classList.add('selected');

  const { targetH, targetW, targetTop, targetLeft } = computeHallTarget(rect, compact);
  currentHallOpen = { itemEl, origRect: rect, placeholder };

  tween(1500, (t) => {
    itemEl.style.top = lerp(rect.top, targetTop, t) + 'px';
    itemEl.style.left = lerp(rect.left, targetLeft, t) + 'px';
    itemEl.style.width = lerp(rect.width, targetW, t) + 'px';
    itemEl.style.height = lerp(rect.height, targetH, t) + 'px';
  });

  // build chapter HTML once (with quote anchors embedded) and populate both panels
  const chaptersHtml = data.chapters.map((ch, ci) => ({
    title: ch.title,
    html: buildChapterHtml(ch.body, data.linkedQuotes.filter(lq => lq.chapterIndex === ci)
      .map(lq => ({ offset: lq.offset, length: lq.text.length, quoteIndex: lq.quoteIndex })))
  }));
  hallChaptersDesktop.render(chaptersHtml);
  hallChaptersMobile.render(chaptersHtml);

  hallQuotesCarouselDesktop.render(data.linkedQuotes, jumpToQuote);
  hallQuotesCarouselMobile.render(data.linkedQuotes, jumpToQuote);

  mobileDockImg.src = data.image;
  mobileHeroBar.classList.remove('docked', 'minimized');
  mobileMinimized = false;
  hallMobileScrollHandler = () => {
    const past = hallMobilePanel.scrollTop > 40;
    mobileHeroBar.classList.toggle('docked', past);
  };
  hallMobilePanel.addEventListener('scroll', hallMobileScrollHandler);

  setTimeout(() => {
    hallModalQuotes.classList.add('reveal');
    hallModalText.classList.add('reveal');
    hallMobilePanel.classList.add('reveal');
    hallClose.classList.add('show');
  }, 1500);

  hallClose.onclick = () => closeHallModal(itemEl, placeholder);
}

function closeHallModal(itemEl, placeholder) {
  hallDrift.resume(); // 5s idle countdown restarts fresh from now
  currentHallOpen = null;
  modalCompactMode = null;
  hallModalQuotes.classList.remove('reveal');
  hallModalText.classList.remove('reveal');
  hallMobilePanel.classList.remove('reveal');
  hallClose.classList.remove('show');
  if (hallMobileScrollHandler) hallMobilePanel.removeEventListener('scroll', hallMobileScrollHandler);
  hallChaptersDesktop.close();
  hallChaptersMobile.close();
  currentHighlightEl = null;

  const rect = placeholder.getBoundingClientRect();
  const from = itemEl.getBoundingClientRect();

  tween(1500, (t) => {
    itemEl.style.top = lerp(from.top, rect.top, t) + 'px';
    itemEl.style.left = lerp(from.left, rect.left, t) + 'px';
    itemEl.style.width = lerp(from.width, rect.width, t) + 'px';
    itemEl.style.height = lerp(from.height, rect.height, t) + 'px';
  }, () => {
    itemEl.classList.remove('selected');
    itemEl.removeAttribute('style');
    placeholder.remove();
    document.body.classList.remove('modal-compact');
    hallTrack.querySelectorAll('.saint-item').forEach(el => el.classList.remove('dim'));
  });
}

function parseArmoryQuotes(raw) {
  const lines = raw.split('\n');
  const out = [];
  for (let i = 0; i < lines.length; i += 3) {
    const source = (lines[i] || '').trim();
    const quote = (lines[i + 1] || '').trim();
    if (source && quote) out.push({ source, quote });
  }
  return out;
}

let ARMORY_QUOTES = [];

function renderArmory() {
  armoryTrack.innerHTML = '';
  const head = cyclicSlice(ARMORY_QUOTES, ARMORY_QUOTES.length - ARMORY_BUFFER, ARMORY_BUFFER);
  const tail = cyclicSlice(ARMORY_QUOTES, 0, ARMORY_BUFFER);
  const full = [...head, ...ARMORY_QUOTES, ...tail];

  full.forEach((q) => {
    const el = document.createElement('div');
    el.className = 'spear';
    el.innerHTML = `
      <div class="hilt"><div class="pommel"></div><div class="grip"></div><div class="guard"></div></div>
      <div class="shaft-text">${q.quote}</div>`;
    el.addEventListener('click', () => openArmoryModal(el, q));
    armoryTrack.appendChild(el);
  });

  requestAnimationFrame(() => {
    armoryInertia.measure();
    const first = armoryTrack.children[ARMORY_BUFFER];
    if (first) armoryInertia.resetTo(first.offsetLeft);
  });
}

const armoryInertia = attachLoopScroll(armoryTrack, ARMORY_BUFFER, () => ARMORY_QUOTES.length, { axis: 'x' });
const armoryDrift = attachIdleDrift(armoryTrack);

function armoryScaleFor(rect) {
  const desired = 1.5;
  const maxAllowed = (window.innerWidth - 24) / rect.height;
  return Math.min(desired, maxAllowed);
}

let currentArmoryOpen = null; // { spearEl, origRect } while an Armory modal is open

function armorySpearTarget(origRect) {
  const scale = armoryScaleFor(origRect);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 - 30;
  return {
    scale,
    targetTop: cy - origRect.height / 2,
    targetLeft: cx - origRect.width / 2,
    attributionTop: cy + (origRect.width * scale) / 2 + 26
  };
}

function openArmoryModal(spearEl, q) {
  armoryDrift.pause();
  const rect = spearEl.getBoundingClientRect();

  const placeholder = document.createElement('div');
  placeholder.className = 'spear-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(spearEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(spearEl).marginBottom;

  armoryTrack.querySelectorAll('.spear').forEach(el => { if (el !== spearEl) el.classList.add('dim'); });

  spearEl.style.top = rect.top + 'px';
  spearEl.style.left = rect.left + 'px';
  spearEl.style.width = rect.width + 'px';
  spearEl.style.height = rect.height + 'px';
  spearEl.style.transform = 'rotate(0deg) scale(1)';
  spearEl.classList.add('selected');

  currentArmoryOpen = { spearEl, origRect: rect };
  const { scale, targetTop, targetLeft, attributionTop } = armorySpearTarget(rect);

  tween(1500, (t) => {
    spearEl.style.top = lerp(rect.top, targetTop, t) + 'px';
    spearEl.style.left = lerp(rect.left, targetLeft, t) + 'px';
    const r = lerp(0, -90, t);

  armoryAttribution.style.top = attributionTop + 'px';
  armoryAttribution.style.left = '50%';

  const isSaint = SAINTS.some(s => s.name.toLowerCase() === q.source.toLowerCase());

  } else {
    const url = `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q.source)}`;
    html = `&mdash; <a href="${url}" target="_blank" rel="noopener">${q.source}</a>`;
  }
  armoryAttribution.innerHTML = html;

  setTimeout(() => {
    armoryAttribution.classList.add('reveal');
    armoryClose.classList.add('show');
  }, 1500);

  const jumpLink = armoryAttribution.querySelector('[data-jump-saint]');
  if (jumpLink) {
    jumpLink.onclick = (e) => {
      e.preventDefault();
      closeArmoryModal(spearEl, placeholder);
      document.querySelector('header nav a[data-view="hall"]').click();
      const target = SAINTS.find(s => s.name.toLowerCase() === q.source.toLowerCase());
      if (target) {
        setTimeout(() => {
          const itemEl = [...hallTrack.querySelectorAll('.saint-item')].find(el => el.dataset.id === target.id);
          if (itemEl) openHallModal(itemEl, target);
        }, 200);
      }
    };
  }

  armoryClose.onclick = () => closeArmoryModal(spearEl, placeholder);
}

/* The placeholder's captured box was a close but not pixel-perfect stand-in
   for the spear's true flex-computed resting slot (the hilt's padding/gap
   made the two diverge slightly) — enough to be visible as a small jump
   right at the end of the sheathing animation. Measuring the spear directly
   in a momentary, unpainted flow state removes that guesswork entirely. */
function measureTrueRestingRect(spearEl, placeholder) {
  const savedStyle = spearEl.getAttribute('style');
  const savedClass = spearEl.className;
  const savedPlaceholderDisplay = placeholder.style.display;
  placeholder.style.display = 'none';
  spearEl.className = 'spear';
  spearEl.removeAttribute('style');
  const rect = spearEl.getBoundingClientRect();
  spearEl.setAttribute('style', savedStyle);
  spearEl.className = savedClass;
  placeholder.style.display = savedPlaceholderDisplay;
  return rect;
}

function closeArmoryModal(spearEl, placeholder) {
  armoryDrift.resume(); // 5s idle countdown restarts fresh from now
  currentArmoryOpen = null;
  armoryAttribution.classList.remove('reveal');
  armoryClose.classList.remove('show');

  // Read where the spear ACTUALLY is right now, directly, rather than
  // recomputing it via a formula that has to exactly reproduce reality.
  const fromTop = parseFloat(spearEl.style.top) || 0;
  const fromLeft = parseFloat(spearEl.style.left) || 0;
  const scaleMatch = /scale\(([\d.]+)\)/.exec(spearEl.style.transform || '');
  const fromScale = scaleMatch ? parseFloat(scaleMatch[1]) : 1;

  // Rough resting rect, good enough for picking the overshoot point —
  // the exact final landing spot is handled separately below, with zero
  // prediction involved.
  const roughRect = measureTrueRestingRect(spearEl, placeholder);
  const overshootTop = roughRect.top - 30;

  armoryTrack.querySelectorAll('.spear').forEach(el => { if (el !== spearEl) el.classList.remove('dim'); });

  tween(1000, (t) => {
    spearEl.style.top = lerp(fromTop, overshootTop, t) + 'px';
    spearEl.style.left = lerp(fromLeft, roughRect.left, t) + 'px';
    const r = lerp(-90, 0, t);
    const s = lerp(fromScale, 1, t);
    spearEl.style.transform = `rotate(${r}deg) scale(${s})`;
  }, () => {
    // FLIP: snapshot the overshoot spot, THEN actually put the spear in
    // its real flow position (ground truth — not a prediction), measure
    // where that truly landed, invert back to the overshoot spot with a
    // transform, then animate that transform away to zero. Since the
    // "final" position is measured after really being there, it cannot
    // be wrong.
    const overshootTopNow = parseFloat(spearEl.style.top) || 0;
    const overshootLeftNow = parseFloat(spearEl.style.left) || 0;

    spearEl.classList.remove('selected');
    spearEl.removeAttribute('style');
    placeholder.remove();
    const finalRect = spearEl.getBoundingClientRect();

    const dTop = overshootTopNow - finalRect.top;
    const dLeft = overshootLeftNow - finalRect.left;
    spearEl.style.transform = `translate(${dLeft}px, ${dTop}px)`;
    void spearEl.offsetHeight; // force reflow so this inverted state is registered before animating away from it

    tween(417, (t2) => {
      spearEl.style.transform = `translate(${lerp(dLeft, 0, t2)}px, ${lerp(dTop, 0, t2)}px)`;
    }, () => {
      spearEl.style.transform = '';
    });
  });
}

/* =====================================================================
   INIT
===================================================================== */
loadSaints().then(({ saints, source }) => {
  SAINTS = saints;
  renderHall();
  const badge = document.getElementById('data-source-badge');
  const messages = {
    unconfigured: 'Demo data — set GITHUB_OWNER/REPO at the top of the script',
    error: 'Demo data — GitHub fetch failed, see console',
    empty: 'Demo data — no folders found under assets/saints/, see console',
    live: `Loaded ${saints.length} saint(s) from GitHub`
  };
  badge.textContent = messages[source] || '';
  badge.style.display = 'block';
});

fetch('assets/text/quotes.txt')
  .then(r => { if (!r.ok) throw new Error('no file'); return r.text(); })
  .then(text => { ARMORY_QUOTES = parseArmoryQuotes(text); })
  .catch(() => { ARMORY_QUOTES = parseArmoryQuotes(QUOTES_FALLBACK); })
  .finally(() => { renderArmory(); });

/* Repositions the open Hall modal on resize. If the resize also crossed
   the split-panel/compact threshold, crossfades between the two layouts
   instead of snapping — fade the current panel set out, swap layout +
   reposition the card while invisible, fade the new panel set in. */
function refreshHallModalLayout() {
  if (!currentHallOpen) return;

  // Sibling cards resize live (their height is vh-based via aspect-ratio),
  // but the placeholder reserving this card's slot in the row was frozen
  // at open time — if it drifts out of sync with its resizing neighbours,
  // a gap or overlap appears once the card returns to the row on close.
  const sibling = hallTrack.querySelector('.saint-item.dim');
  if (sibling && currentHallOpen.placeholder) {
    const sibRect = sibling.getBoundingClientRect();
    currentHallOpen.placeholder.style.width = sibRect.width + 'px';
    currentHallOpen.placeholder.style.height = sibRect.height + 'px';
    currentHallOpen.origRect = sibRect;
  }

  const { itemEl, origRect } = currentHallOpen;
  const compact = isModalCompact(origRect);

  if (compact === modalCompactMode) {
    const { targetH, targetW, targetTop, targetLeft } = computeHallTarget(origRect, compact);
    itemEl.style.top = targetTop + 'px';
    itemEl.style.left = targetLeft + 'px';
    itemEl.style.width = targetW + 'px';
    itemEl.style.height = targetH + 'px';
    return;
  }

  modalCompactMode = compact;
  hallModalQuotes.classList.remove('reveal');
  hallModalText.classList.remove('reveal');
  hallMobilePanel.classList.remove('reveal');

  setTimeout(() => {
    document.body.classList.toggle('modal-compact', compact);
    const { targetH, targetW, targetTop, targetLeft } = computeHallTarget(origRect, compact);
    itemEl.style.top = targetTop + 'px';
    itemEl.style.left = targetLeft + 'px';
    itemEl.style.width = targetW + 'px';
    itemEl.style.height = targetH + 'px';
    requestAnimationFrame(() => {
      hallModalQuotes.classList.add('reveal');
      hallModalText.classList.add('reveal');
      hallMobilePanel.classList.add('reveal');
    });
  }, 500);
}

window.addEventListener('resize', () => {
  hallInertia.measure();
  armoryInertia.measure();

  refreshHallModalLayout();

  if (currentArmoryOpen) {
    const { spearEl, origRect } = currentArmoryOpen;
    const { scale, targetTop, targetLeft, attributionTop } = armorySpearTarget(origRect);
    spearEl.style.top = targetTop + 'px';
    spearEl.style.left = targetLeft + 'px';
    spearEl.style.transform = `rotate(-90deg) scale(${scale})`;
    armoryAttribution.style.top = attributionTop + 'px';
  }
});
</script>
