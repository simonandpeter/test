<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root{
    --ink: #1c1a16;
    --ink-soft: #55524a;
    --line-grey: #b7b1a2;
    --line-grey-soft: #e2ddd0;
    --rubric: #8a2e26;
    --gold-glow: rgba(154,124,58,0.18);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:#ffffff;
    color:var(--ink);
    font-family:'Times New Roman', Times, serif;
    overflow:hidden;
  }
  a{ color:inherit; }

  /* ---------------- Header ---------------- */
  header{
    height:30px;
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--line-grey-soft);
    padding:0 20px;
  }
  header .brand{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    font-size:16px;
    letter-spacing:0.08em;
  }
  header nav{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
  }
  header nav a{
    cursor:pointer;
    padding-bottom:3px;
    border-bottom:1px solid transparent;
    transition:border-color .3s ease, color .3s ease;
  }
  header nav a:hover,
  header nav a.active{
    color:var(--rubric);
    border-color:var(--rubric);
  }
  header .spacer{ flex:1 1 0%; }

  main{ height:calc(100vh - 30px); position:relative; }

  .view{
    position:absolute; inset:0;
    display:none;
  }
  .view.active{ display:block; }

  /* ---------------- Hall of Saints ---------------- */
  #hall-track{
    height:100%;
    display:flex;
    align-items:flex-start;
    gap:0;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #hall-track::-webkit-scrollbar{ display:none; }

  .saint-item{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:10px;
    margin-bottom:40px;
    cursor:pointer;
    transition:opacity 1s ease;
  }
  .saint-item.dim{ opacity:0; pointer-events:none; }

  .saint-card{
    flex:0 0 auto;
    height:calc(100vh - 104px); /* 30 header + 10 top + 40 bottom + ~24 caption row */
    aspect-ratio:1/2; /* 2:1 height to width */
    overflow:hidden;
    background:#fdfdfc;
    transition:box-shadow .4s ease;
  }
  .saint-item:hover .saint-card{
    box-shadow:0 20px 44px -20px var(--gold-glow);
  }
  .saint-card img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }

  .saint-caption{
    margin-top:10px;
    font-size:11px;
    line-height:14px;
    letter-spacing:0.08em;
    text-align:center;
    text-transform:uppercase;
    color:var(--ink-soft);
    transition:color .3s ease;
  }
  .saint-item:hover .saint-caption{ color:var(--rubric); }

  .saint-item.selected{
    position:fixed;
    z-index:40;
    margin:0;
    transform-origin:top left;
  }
  .saint-item.selected.animate-pos{
    transition:transform 1.5s cubic-bezier(.2,.8,.2,1);
  }
  .item-placeholder{ flex:0 0 auto; visibility:hidden; }

  /* ---------------- Hall Modal side panels ---------------- */
  #hall-modal-quotes, #hall-modal-text{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:min(26vw, 340px);
    opacity:0;
    transition:opacity 1s ease, transform 1s ease;
    z-index:41;
    pointer-events:none;
  }
  #hall-modal-quotes.reveal, #hall-modal-text.reveal{
    opacity:1;
    pointer-events:auto;
  }
  #hall-modal-quotes{ text-align:right; }
  #hall-modal-quotes .label, #hall-modal-text .label{
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--rubric);
    margin-bottom:12px;
  }
  #hall-modal-quotes .q{
    display:block;
    font-style:italic;
    font-size:14px;
    color:var(--ink-soft);
    padding:8px 0;
    border-bottom:1px solid var(--line-grey-soft);
  }
  #hall-modal-text p{
    font-size:15px;
    line-height:1.7;
    color:var(--ink-soft);
  }

  #hall-close{
    position:fixed;
    top:44px; right:6vw;
    z-index:42;
    width:34px; height:34px;
    border:1px solid var(--line-grey);
    background:#fff;
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .3s ease, transform .3s ease;
  }
  #hall-close.show{ display:flex; }
  #hall-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  /* ---------------- Armory ---------------- */
  #armory-track{
    height:100%;
    display:flex;
    align-items:center;
    gap:14px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #armory-track::-webkit-scrollbar{ display:none; }

  .spear{
    flex:0 0 auto;
    width:54px;
    height:calc(100vh - 100px);
    margin-top:10px; margin-bottom:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    transition:opacity 1s ease;
  }
  .spear .tip{
    position:absolute;
    top:10px; left:50%;
    transform:translateX(-50%);
    width:14px; height:14px;
  }
  .spear .tip::before, .spear .tip::after{
    content:'';
    position:absolute;
    background:var(--line-grey);
    transition:background-color .4s ease;
  }
  .spear .tip::before{ left:50%; top:0; width:1.5px; height:100%; transform:translateX(-50%); }
  .spear .tip::after{ top:50%; left:0; height:1.5px; width:100%; transform:translateY(-50%); }
  .spear:hover .tip::before, .spear:hover .tip::after{ background:var(--rubric); }
  .spear .shaft-text{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-style:italic;
    font-size:13px;
    color:var(--ink-soft);
    max-height:calc(100% - 60px);
    overflow:hidden;
    letter-spacing:0.02em;
    transition:color .3s ease;
  }
  .spear:hover .shaft-text{ color:var(--ink); }
  .spear.dim{ opacity:0; pointer-events:none; }
  .spear.selected{
    position:fixed;
    z-index:40;
    margin:0;
    background:#fff;
    transform-origin:center center;
  }
  .spear.selected.animate-pos{
    transition:top 1.5s cubic-bezier(.2,.8,.2,1), left 1.5s cubic-bezier(.2,.8,.2,1),
               transform 1.5s cubic-bezier(.2,.8,.2,1);
  }
  .spear.selected.animate-pos.settle{
    transition:top .5s cubic-bezier(.25,.8,.4,1);
  }
  .spear.selected .tip{ display:none; }
  .spear-placeholder{ flex:0 0 auto; visibility:hidden; }

  #armory-attribution{
    position:fixed;
    left:50%; transform:translateX(-50%);
    top:calc(50% + 60px);
    z-index:41;
    font-style:italic;
    font-size:14px;
    color:var(--ink-soft);
    text-align:center;
    opacity:0;
    transition:opacity 1s ease;
    white-space:nowrap;
  }
  #armory-attribution.reveal{ opacity:1; }
  #armory-attribution a{
    border-bottom:1px solid var(--rubric);
    color:var(--rubric);
    text-decoration:none;
  }

  #armory-close{
    position:fixed;
    top:44px; right:6vw;
    z-index:42;
    width:34px; height:34px;
    border:1px solid var(--line-grey);
    background:#fff;
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .3s ease, transform .3s ease;
  }
  #armory-close.show{ display:flex; }
  #armory-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  @media (max-width:700px){
    #hall-modal-quotes, #hall-modal-text{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">Test</div>
  <nav>
    <a data-view="hall" class="active">Hall of Saints</a>
    <a data-view="armory">Armory</a>
  </nav>
  <div class="spacer"></div>
</header>

<main>

  <!-- ===================== HALL OF SAINTS ===================== -->
  <section id="hall-view" class="view active">
    <div id="hall-track"></div>

    <div id="hall-modal-quotes">
      <div class="label">Key Sayings</div>
      <div id="hall-quotes-list"></div>
    </div>
    <div id="hall-modal-text">
      <div class="label">Vita</div>
      <p id="hall-lorem"></p>
    </div>
    <div id="hall-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

  <!-- ===================== ARMORY ===================== -->
  <section id="armory-view" class="view">
    <div id="armory-track"></div>
    <div id="armory-attribution"></div>
    <div id="armory-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

</main>

<script>
/* =====================================================================
   DATA — SAINTS
   Add / remove cards here. `image` points at assets/images/icons/...
   in the repo — update to match exactly what's committed there
   (GitHub Pages is case-sensitive).
===================================================================== */
const SAINTS = Array.from({ length: 10 }, (_, i) => ({
  id: i + 1,
  name: 'St Antony the Great',
  image: 'assets/images/icons/St Antony the Great.jpg',
  quotes: [
    'I no longer fear God, but I love Him.',
    'Whoever sits in solitude is delivered from three wars.',
    'My life is with my neighbour.'
  ],
  vita: `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.`
}));

/* Fallback quotes, used only if assets/text/quotes.txt can't be fetched
   (e.g. this preview, or opening the file directly without a server).
   Format mirrors the .txt spec: source line, quote line, blank line. */
const QUOTES_FALLBACK = `
St Antony the Great
He who sits in solitude and is quiet hath escaped from three wars.

St Antony the Great
Life and death depend on our neighbour.

John 15:12
Love one another, as I have loved you.

Psalm 46:10
Be still, and know that I am God.

St Antony the Great
I no longer fear God, but I love Him, for love casteth out fear.

Matthew 5:8
Blessed are the pure in heart, for they shall see God.
`.trim();

function parseQuotes(raw) {
  const lines = raw.split('\n');
  const out = [];
  for (let i = 0; i < lines.length; i += 3) {
    const source = (lines[i] || '').trim();
    const quote = (lines[i + 1] || '').trim();
    if (source && quote) out.push({ source, quote });
  }
  return out;
}

let QUOTES = [];

/* =====================================================================
   NAV
===================================================================== */
document.querySelectorAll('header nav a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('header nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    const target = a.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`${target}-view`).classList.add('active');
  });
});

/* =====================================================================
   SHARED — inertial wheel-to-horizontal scroll with seamless looping
===================================================================== */
function attachInertialLoop(trackEl, bufferCount, getItemCount) {
  let targetScroll = 0;
  let isEasing = false;
  let raf = null;

  function itemStride() {
    const a = trackEl.children[bufferCount];
    const b = trackEl.children[bufferCount + 1];
    if (!a || !b) return 0;
    return b.offsetLeft - a.offsetLeft;
  }

  function checkLoop() {
    const stride = itemStride();
    const count = getItemCount();
    if (!stride || !count) return;
    const headWidth = bufferCount * stride;
    const bodyWidth = count * stride;
    if (trackEl.scrollLeft < headWidth - stride * (bufferCount - 1)) {
      trackEl.scrollLeft += bodyWidth;
      targetScroll += bodyWidth;
    } else if (trackEl.scrollLeft > headWidth + bodyWidth) {
      trackEl.scrollLeft -= bodyWidth;
      targetScroll -= bodyWidth;
    }
  }

  function tick() {
    const current = trackEl.scrollLeft;
    const diff = targetScroll - current;
    if (Math.abs(diff) < 0.5) {
      trackEl.scrollLeft = targetScroll;
      isEasing = false;
      raf = null;
      checkLoop();
      return;
    }
    trackEl.scrollLeft = current + diff * 0.16;
    checkLoop();
    raf = requestAnimationFrame(tick);
  }

  trackEl.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      targetScroll += e.deltaY;
      isEasing = true;
      if (!raf) raf = requestAnimationFrame(tick);
    }
  }, { passive: false });

  trackEl.addEventListener('scroll', () => {
    if (isEasing) return;
    targetScroll = trackEl.scrollLeft;
    checkLoop();
  });

  return {
    resetTo(scrollLeftValue) {
      trackEl.scrollLeft = scrollLeftValue;
      targetScroll = scrollLeftValue;
    }
  };
}

/* Builds `count` items cycling through `list` starting at `start`
   (wrapping around as many times as needed) — used so a short list of
   narrow items (e.g. Armory quotes) still gets a wide enough clone
   buffer to scroll freely in both directions before looping. */
function cyclicSlice(list, start, count) {
  const out = [];
  const n = list.length;
  for (let i = 0; i < count; i++) {
    out.push(list[((start + i) % n + n) % n]);
  }
  return out;
}

/* =====================================================================
   HALL OF SAINTS — carousel, modal
===================================================================== */
const hallTrack = document.getElementById('hall-track');
const LOOP_BUFFER = 4;

function renderHall() {
  hallTrack.innerHTML = '';
  const head = cyclicSlice(SAINTS, SAINTS.length - LOOP_BUFFER, LOOP_BUFFER);
  const tail = cyclicSlice(SAINTS, 0, LOOP_BUFFER);
  const full = [...head, ...SAINTS, ...tail];

  full.forEach((s) => {
    const item = document.createElement('div');
    item.className = 'saint-item';
    item.dataset.id = s.id;
    item.innerHTML = `
      <div class="saint-card"><img src="${encodeURI(s.image)}" alt="${s.name}"></div>
      <div class="saint-caption">${s.name}</div>`;
    item.addEventListener('click', () => openHallModal(item, s));
    hallTrack.appendChild(item);
  });

  requestAnimationFrame(() => {
    const first = hallTrack.children[LOOP_BUFFER];
    if (first) hallInertia.resetTo(first.offsetLeft);
  });
}

const hallInertia = attachInertialLoop(hallTrack, LOOP_BUFFER, () => SAINTS.length);

/* ---- Hall modal ---- */
const hallQuotesSide = document.getElementById('hall-modal-quotes');
const hallTextSide = document.getElementById('hall-modal-text');
const hallQuotesList = document.getElementById('hall-quotes-list');
const hallLorem = document.getElementById('hall-lorem');
const hallClose = document.getElementById('hall-close');

function openHallModal(itemEl, data) {
  const rect = itemEl.getBoundingClientRect();

  // reserve the item's slot so the row never reflows while it's "lifted out"
  const placeholder = document.createElement('div');
  placeholder.className = 'item-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(itemEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(itemEl).marginBottom;
  itemEl.after(placeholder);

  hallTrack.querySelectorAll('.saint-item').forEach(el => {
    if (el !== itemEl) el.classList.add('dim');
  });

  itemEl.style.top = rect.top + 'px';
  itemEl.style.left = rect.left + 'px';
  itemEl.style.width = rect.width + 'px';
  itemEl.style.height = rect.height + 'px';
  itemEl.style.transform = 'translate(0px, 0px) scale(1)';
  itemEl.classList.add('selected', 'animate-pos');

  requestAnimationFrame(() => {
    const targetH = window.innerHeight * 0.62;
    const scale = targetH / rect.height;
    const targetW = rect.width * scale;
    const targetTop = (window.innerHeight - targetH) / 2;
    const targetLeft = (window.innerWidth - targetW) / 2;
    const dx = targetLeft - rect.left;
    const dy = targetTop - rect.top;
    itemEl.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
  });

  hallQuotesList.innerHTML = data.quotes.map(q => `<span class="q">&ldquo;${q}&rdquo;</span>`).join('');
  hallLorem.textContent = data.vita;

  setTimeout(() => {
    hallQuotesSide.classList.add('reveal');
    hallTextSide.classList.add('reveal');
    hallClose.classList.add('show');
  }, 1500);

  hallClose.onclick = () => closeHallModal(itemEl, placeholder);
}

function closeHallModal(itemEl, placeholder) {
  hallQuotesSide.classList.remove('reveal');
  hallTextSide.classList.remove('reveal');
  hallClose.classList.remove('show');

  itemEl.style.transform = 'translate(0px, 0px) scale(1)';

  setTimeout(() => {
    itemEl.classList.remove('selected', 'animate-pos');
    itemEl.removeAttribute('style');
    placeholder.remove();
    hallTrack.querySelectorAll('.saint-item').forEach(el => el.classList.remove('dim'));
  }, 1500);
}

/* =====================================================================
   ARMORY — vertical "spear" quotes, modal
===================================================================== */
const armoryTrack = document.getElementById('armory-track');
const armoryAttribution = document.getElementById('armory-attribution');
const armoryClose = document.getElementById('armory-close');
/* Spears are narrow (54px), so a short quotes.txt can end up with barely
   any scrollable width. Cycle through the list enough times on each
   side to comfortably outspan any screen width. */
const ARMORY_BUFFER = 24;

function renderArmory() {
  armoryTrack.innerHTML = '';
  const head = cyclicSlice(QUOTES, QUOTES.length - ARMORY_BUFFER, ARMORY_BUFFER);
  const tail = cyclicSlice(QUOTES, 0, ARMORY_BUFFER);
  const full = [...head, ...QUOTES, ...tail];

  full.forEach((q) => {
    const el = document.createElement('div');
    el.className = 'spear';
    el.innerHTML = `<div class="tip"></div><div class="shaft-text">${q.quote}</div>`;
    el.addEventListener('click', () => openArmoryModal(el, q));
    armoryTrack.appendChild(el);
  });

  requestAnimationFrame(() => {
    const first = armoryTrack.children[ARMORY_BUFFER];
    if (first) armoryInertia.resetTo(first.offsetLeft);
  });
}

const armoryInertia = attachInertialLoop(armoryTrack, ARMORY_BUFFER, () => QUOTES.length);

function openArmoryModal(spearEl, q) {
  const rect = spearEl.getBoundingClientRect();

  const placeholder = document.createElement('div');
  placeholder.className = 'spear-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(spearEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(spearEl).marginBottom;
  spearEl.after(placeholder);

  armoryTrack.querySelectorAll('.spear').forEach(el => {
    if (el !== spearEl) el.classList.add('dim');
  });

  spearEl.style.top = rect.top + 'px';
  spearEl.style.left = rect.left + 'px';
  spearEl.style.width = rect.width + 'px';
  spearEl.style.height = rect.height + 'px';
  spearEl.style.transform = 'rotate(0deg)';
  spearEl.classList.add('selected', 'animate-pos');

  requestAnimationFrame(() => {
    // width/height never change — the spear keeps its own proportions
    // and is simply carried to centre and laid flat by rotating it.
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2 - 30;
    spearEl.style.top = (cy - rect.height / 2) + 'px';
    spearEl.style.left = (cx - rect.width / 2) + 'px';
    spearEl.style.transform = 'rotate(-90deg)';
    armoryAttribution.style.top = (cy + rect.width / 2 + 26) + 'px';
    armoryAttribution.style.left = '50%';
  });

  const isSaint = SAINTS.some(s => s.name.toLowerCase() === q.source.toLowerCase());
  let html;
  if (isSaint) {
    html = `&mdash; <a href="#" data-jump-saint="${q.source}">${q.source}</a>`;
  } else {
    const url = `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q.source)}`;
    html = `&mdash; <a href="${url}" target="_blank" rel="noopener">${q.source}</a>`;
  }
  armoryAttribution.innerHTML = html;

  setTimeout(() => {
    armoryAttribution.classList.add('reveal');
    armoryClose.classList.add('show');
  }, 1500);

  const jumpLink = armoryAttribution.querySelector('[data-jump-saint]');
  if (jumpLink) {
    jumpLink.onclick = (e) => {
      e.preventDefault();
      closeArmoryModal(spearEl, placeholder);
      document.querySelector('header nav a[data-view="hall"]').click();
      const target = SAINTS.find(s => s.name.toLowerCase() === q.source.toLowerCase());
      if (target) {
        setTimeout(() => {
          const itemEl = [...hallTrack.querySelectorAll('.saint-item')]
            .find(el => Number(el.dataset.id) === target.id);
          if (itemEl) openHallModal(itemEl, target);
        }, 200);
      }
    };
  }

  armoryClose.onclick = () => closeArmoryModal(spearEl, placeholder);
}

/* Armory close: an exact reverse of the open animation (rotate + slide
   back), but it overshoots to a spot 20px above the true resting place.
   Once the rest of the rack has faded back in, a short second animation
   slots the spear the last 20px down into its exact original position. */
function closeArmoryModal(spearEl, placeholder) {
  armoryAttribution.classList.remove('reveal');
  armoryClose.classList.remove('show');

  const rect = placeholder.getBoundingClientRect();

  // Step 1 — reverse of the open animation, overshooting 20px high.
  spearEl.style.top = (rect.top - 20) + 'px';
  spearEl.style.left = rect.left + 'px';
  spearEl.style.transform = 'rotate(0deg)';

  setTimeout(() => {
    // Step 2 — the rest of the rack fades back in.
    armoryTrack.querySelectorAll('.spear').forEach(el => {
      if (el !== spearEl) el.classList.remove('dim');
    });

    setTimeout(() => {
      // Step 3 — the spear slots smoothly down the last 20px.
      spearEl.classList.add('settle');
      spearEl.style.top = rect.top + 'px';

      setTimeout(() => {
        spearEl.classList.remove('selected', 'animate-pos', 'settle');
        spearEl.removeAttribute('style');
        placeholder.remove();
      }, 550);
    }, 1000);
  }, 1500);
}

/* =====================================================================
   INIT — load quotes.txt, fall back to embedded placeholder text
===================================================================== */
fetch('assets/text/quotes.txt')
  .then(r => { if (!r.ok) throw new Error('no file'); return r.text(); })
  .then(text => { QUOTES = parseQuotes(text); })
  .catch(() => { QUOTES = parseQuotes(QUOTES_FALLBACK); })
  .finally(() => {
    renderHall();
    renderArmory();
  });
</script>
