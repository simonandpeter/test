<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root{
    --ink: #1c1a16;
    --ink-soft: #55524a;
    --line-grey: #b7b1a2;
    --line-grey-soft: #e2ddd0;
    --rubric: #8a2e26;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:#ffffff;
    color:var(--ink);
    font-family:'Times New Roman', Times, serif;
    overflow:hidden;
  }
  a{ color:inherit; }

  /* ---------------- Header ---------------- */
  header{
    height:30px;
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--line-grey-soft);
    padding:0 20px;
  }
  header .brand{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    font-size:16px;
    letter-spacing:0.08em;
    white-space:nowrap;
  }
  header nav{
    flex:1 1 0%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
  }
  header nav a{
    cursor:pointer;
    padding-bottom:3px;
    border-bottom:1px solid transparent;
    white-space:nowrap;
    transition:border-color .3s ease, color .3s ease;
  }
  header nav a:hover,
  header nav a.active{
    color:var(--rubric);
    border-color:var(--rubric);
  }
  header .spacer{ flex:1 1 0%; }

  @media (max-width:700px){
    header .brand{ font-size:14px; }
    header nav{ gap:34px; justify-content:flex-end; padding-right:4px; }
  }

  main{ height:calc(100vh - 30px); position:relative; }

  .view{
    position:absolute; inset:0;
    display:none;
  }
  .view.active{ display:block; }

  /* ---------------- Hall of Saints ---------------- */
  #hall-track{
    height:100%;
    display:flex;
    align-items:flex-start;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #hall-track::-webkit-scrollbar{ display:none; }

  .saint-item{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:10px;
    margin-bottom:40px;
    cursor:pointer;
    transition:opacity 1s ease;
  }
  .saint-item.dim{ opacity:0; pointer-events:none; }

  .saint-card{
    flex:0 0 auto;
    height:calc(100vh - 104px); /* 30 header + 10 top + 40 bottom + ~24 caption row */
    aspect-ratio:1/2.4; /* thinner: width to height */
    overflow:hidden;
    background:#fdfdfc;
  }
  .saint-card img{
    width:100%; height:100%;
    object-fit:contain; /* do not scale/crop — the source image is pre-sized */
    display:block;
  }

  .saint-caption{
    margin-top:10px;
    font-size:11px;
    line-height:14px;
    letter-spacing:0.08em;
    text-align:center;
    text-transform:uppercase;
    color:var(--ink-soft);
    transition:color .3s ease;
  }
  .saint-item:hover .saint-caption{ color:var(--rubric); }

  .saint-item.selected{
    position:fixed;
    z-index:40;
    margin:0;
    transform-origin:top left;
  }
  .saint-item.selected .saint-card{ box-shadow:none !important; }
  .saint-item.selected.animate-pos{
    transition:transform 1.5s cubic-bezier(.2,.8,.2,1);
  }
  .item-placeholder{ flex:0 0 auto; visibility:hidden; }

  /* ---------------- Hall Modal — desktop split panel ---------------- */
  #hall-modal-quotes, #hall-modal-text{
    position:fixed;
    top:0; height:100%; width:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity 1s ease;
    z-index:41;
    pointer-events:none;
  }
  #hall-modal-quotes{ left:0; }
  #hall-modal-text{ right:0; }
  #hall-modal-quotes.reveal, #hall-modal-text.reveal{
    opacity:1;
    pointer-events:auto;
  }
  .label{
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--rubric);
    margin-bottom:12px;
    text-align:center;
  }

  .quotes-viewport{
    position:relative;
    width:min(320px, 80vw);
    height:308px; /* 7 rows x 44px */
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
  }
  .quotes-viewport.small{ height:120px; }
  .quotes-track{
    display:flex;
    flex-direction:column;
    height:100%;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .quotes-track::-webkit-scrollbar{ display:none; }
  .quotes-track .q{
    flex:0 0 auto;
    height:44px;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-style:italic;
    font-size:14px;
    color:var(--ink-soft);
    padding:0 14px;
    border-bottom:1px solid var(--line-grey-soft);
  }
  .quotes-viewport.small .q{ height:34px; font-size:12px; }

  .text-scroll{
    width:min(400px, 80vw);
    max-height:70vh;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .text-scroll::-webkit-scrollbar{ display:none; }
  .text-scroll p{
    font-size:15px;
    line-height:1.7;
    color:var(--ink-soft);
    margin-bottom:1.1em;
  }

  #hall-close{
    position:fixed;
    top:44px; right:6vw;
    z-index:42;
    width:34px; height:34px;
    border:1px solid var(--line-grey);
    background:#fff;
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .3s ease, transform .3s ease;
  }
  #hall-close.show{ display:flex; }
  #hall-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  /* ---------------- Hall Modal — mobile single-column ---------------- */
  #hall-mobile-panel{ display:none; }
  @media (max-width:700px){
    #hall-modal-quotes, #hall-modal-text{ display:none; }
    #hall-mobile-panel{
      display:block;
      position:fixed; inset:0;
      padding-top:40vh;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      opacity:0; pointer-events:none;
      transition:opacity 1s ease;
      z-index:35;
      background:#fff;
    }
    #hall-mobile-panel.reveal{ opacity:1; pointer-events:auto; }
    .mobile-quotes-sticky{
      position:sticky; top:0;
      background:#fff;
      padding:10px 16px 12px 16px;
      border-bottom:1px solid var(--line-grey-soft);
      z-index:2;
    }
    .mobile-quotes-sticky .label{ margin-bottom:6px; }
    .mobile-lorem{ padding:20px 22px 70px 22px; }
    .mobile-lorem p{ font-size:15px; line-height:1.7; color:var(--ink-soft); margin-bottom:1.1em; }
  }

  /* ---------------- Armory ---------------- */
  #armory-track{
    height:100%;
    display:flex;
    align-items:center;
    gap:14px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
  }
  #armory-track::-webkit-scrollbar{ display:none; }

  .spear{
    flex:0 0 auto;
    width:54px;
    height:calc(100vh - 100px);
    margin-top:10px; margin-bottom:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:14px;
    cursor:pointer;
    position:relative;
    transition:opacity 1s ease;
  }
  .spear .hilt{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    flex:0 0 auto;
  }
  .spear .hilt .pommel{
    width:6px; height:6px; border-radius:50%;
    background:var(--line-grey);
    transition:background-color .4s ease;
  }
  .spear .hilt .grip{
    width:1.5px; height:9px;
    background:var(--line-grey);
    transition:background-color .4s ease;
  }
  .spear .hilt .guard{
    width:24px; height:1.5px;
    background:var(--line-grey);
    transition:background-color .4s ease;
  }
  .spear:hover .hilt .pommel,
  .spear:hover .hilt .grip,
  .spear:hover .hilt .guard{ background:var(--rubric); }

  .spear .shaft-text{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-style:italic;
    font-size:13px;
    color:var(--ink-soft);
    flex:1;
    overflow:hidden;
    letter-spacing:0.02em;
    margin-top:10px;
    transition:color .3s ease;
  }
  .spear:hover .shaft-text{ color:var(--ink); }
  .spear.dim{ opacity:0; pointer-events:none; }
  .spear.selected{
    position:fixed;
    z-index:40;
    margin:0;
    padding-top:0;
    background:#fff;
    transform-origin:center center;
  }
  .spear.selected.animate-pos{
    transition:top 1.5s cubic-bezier(.2,.8,.2,1), left 1.5s cubic-bezier(.2,.8,.2,1),
               transform 1.5s cubic-bezier(.2,.8,.2,1);
  }
  .spear.selected.animate-pos.closing{
    transition:top 1s cubic-bezier(.2,.8,.2,1), left 1s cubic-bezier(.2,.8,.2,1),
               transform 1s cubic-bezier(.2,.8,.2,1);
  }
  .spear.selected .hilt{ display:none; }
  .spear-placeholder{ flex:0 0 auto; visibility:hidden; }

  #armory-attribution{
    position:fixed;
    left:50%; transform:translateX(-50%);
    top:calc(50% + 60px);
    z-index:41;
    font-style:italic;
    font-size:14px;
    color:var(--ink-soft);
    text-align:center;
    opacity:0;
    transition:opacity 1s ease;
    white-space:nowrap;
  }
  #armory-attribution.reveal{ opacity:1; }
  #armory-attribution a{
    border-bottom:1px solid var(--rubric);
    color:var(--rubric);
    text-decoration:none;
  }

  #armory-close{
    position:fixed;
    top:44px; right:6vw;
    z-index:42;
    width:34px; height:34px;
    border:1px solid var(--line-grey);
    background:#fff;
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .3s ease, transform .3s ease;
  }
  #armory-close.show{ display:flex; }
  #armory-close:hover{ border-color:var(--rubric); transform:rotate(90deg); }

  @media (prefers-reduced-motion:reduce){
    *{ transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">Test</div>
  <nav>
    <a data-view="hall" class="active">Hall of Saints</a>
    <a data-view="armory">Armory</a>
  </nav>
  <div class="spacer"></div>
</header>

<main>

  <!-- ===================== HALL OF SAINTS ===================== -->
  <section id="hall-view" class="view active">
    <div id="hall-track"></div>

    <!-- desktop: fixed split panels -->
    <div id="hall-modal-quotes">
      <div>
        <div class="label">Key Sayings</div>
        <div class="quotes-viewport"><div class="quotes-track" id="hall-quotes-track-desktop"></div></div>
      </div>
    </div>
    <div id="hall-modal-text">
      <div class="text-scroll" id="hall-text-scroll-desktop">
        <div class="label">Vita</div>
        <div id="hall-lorem-desktop"></div>
      </div>
    </div>

    <!-- mobile: single scrollable column, sticky quotes subheader -->
    <div id="hall-mobile-panel">
      <div class="mobile-quotes-sticky">
        <div class="label">Key Sayings</div>
        <div class="quotes-viewport small"><div class="quotes-track" id="hall-quotes-track-mobile"></div></div>
      </div>
      <div class="mobile-lorem">
        <div class="label">Vita</div>
        <div id="hall-lorem-mobile"></div>
      </div>
    </div>

    <div id="hall-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

  <!-- ===================== ARMORY ===================== -->
  <section id="armory-view" class="view">
    <div id="armory-track"></div>
    <div id="armory-attribution"></div>
    <div id="armory-close">
      <svg width="14" height="14" viewBox="0 0 16 16" stroke="var(--ink)" stroke-width="1.2">
        <line x1="1" y1="1" x2="15" y2="15"/><line x1="15" y1="1" x2="1" y2="15"/>
      </svg>
    </div>
  </section>

</main>

<script>
/* =====================================================================
   DATA — SAINTS
   Add / remove cards here. `image` points at assets/images/icons/...
   in the repo — update to match exactly what's committed there
   (GitHub Pages is case-sensitive).
===================================================================== */
const VITA_PARAGRAPHS = [
  `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.`,
  `Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.`,
  `Curabitur pretium tincidunt lacus, ut interdum tellus elit sed risus. Maecenas eget condimentum velit, sit amet feugiat lectus. Class aptent taciti sociosqu ad litora torquent per conubia nostra, per inceptos himenaeos.`,
  `Praesent auctor purus luctus enim egestas, ac scelerisque ante pulvinar. Donec ut rhoncus ex. Suspendisse ac rhoncus nisl, eu tempor urna. Curabitur vel bibendum lorem. Morbi convallis convallis diam sit amet lacinia.`,
  `Aliquam erat volutpat. Nunc eleifend leo vitae magna faucibus, id lacinia leo dignissim. Nam sit amet dolor porttitor, blandit augue vel, tristique nunc. Vestibulum ante ipsum primis in faucibus orci luctus.`,
  `Et ultrices posuere cubilia curae; Cras id dui lectus. Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas. Sed vehicula porttitor sem, ac fringilla lorem gravida id.`,
  `Vivamus sagittis lacus vel augue laoreet rutrum faucibus dolor auctor. Cras mattis consectetur purus sit amet fermentum. Curabitur blandit tempus porttitor. Nullam id dolor id nibh ultricies vehicula ut id elit.`
];

const SAINTS = Array.from({ length: 10 }, (_, i) => ({
  id: i + 1,
  name: 'St Antony the Great',
  image: 'assets/images/icons/St Antony the Great.jpg',
  quotes: [
    'I no longer fear God, but I love Him.',
    'Whoever sits in solitude is delivered from three wars.',
    'My life is with my neighbour.'
  ],
  vitaParagraphs: VITA_PARAGRAPHS
}));

/* Fallback quotes, used only if assets/text/quotes.txt can't be fetched
   (e.g. this preview, or opening the file directly without a server).
   Format mirrors the .txt spec: source line, quote line, blank line. */
const QUOTES_FALLBACK = `
St Antony the Great
He who sits in solitude and is quiet hath escaped from three wars.

St Antony the Great
Life and death depend on our neighbour.

John 15:12
Love one another, as I have loved you.

Psalm 46:10
Be still, and know that I am God.

St Antony the Great
I no longer fear God, but I love Him, for love casteth out fear.

Matthew 5:8
Blessed are the pure in heart, for they shall see God.
`.trim();

function parseQuotes(raw) {
  const lines = raw.split('\n');
  const out = [];
  for (let i = 0; i < lines.length; i += 3) {
    const source = (lines[i] || '').trim();
    const quote = (lines[i + 1] || '').trim();
    if (source && quote) out.push({ source, quote });
  }
  return out;
}

let QUOTES = [];

function isMobileViewport() {
  return window.matchMedia('(max-width:700px)').matches;
}

/* =====================================================================
   NAV
===================================================================== */
document.querySelectorAll('header nav a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('header nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    const target = a.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`${target}-view`).classList.add('active');
  });
});

/* =====================================================================
   SHARED — inertial wheel-scroll with seamless looping. Handles both
   axes (used by the horizontal Hall/Armory tracks and the vertical
   quote carousels) and, optionally, residual/idle drift.

   drift: true adds a slow (px/s) creep that kicks in either right after
   a fast flick settles, or after `idleMs` of no interaction — but only
   while nothing is paused (e.g. a modal is open) and the user isn't
   actively scrolling.
===================================================================== */
function attachLoopScroll(trackEl, bufferCount, getItemCount, opts = {}) {
  const axis = opts.axis || 'x';
  const drift = !!opts.drift;
  const driftSpeedTarget = opts.driftSpeed ?? 4; // px/s
  const idleMs = opts.idleMs ?? 7000;
  const fastThreshold = opts.fastThreshold ?? 45;
  const easeFactor = opts.easeFactor ?? 0.16;

  const scrollProp = axis === 'x' ? 'scrollLeft' : 'scrollTop';
  const offsetProp = axis === 'x' ? 'offsetLeft' : 'offsetTop';
  const deltaProp = axis === 'x' ? 'deltaY' : 'deltaY';
  const crossDeltaProp = axis === 'x' ? 'deltaX' : 'deltaX';

  let targetScroll = 0;
  let isEasing = false;
  let isDrifting = false;
  let paused = false;
  let raf = null;
  let lastInteraction = performance.now();
  let driftArmed = false;
  let driftSpeed = 0;
  let driftPos = null; // float accumulator — scrollLeft/Top round to whole px
  let stride = 0;      // cached item width/height + gap; recompute via measure()

  function measure() {
    const a = trackEl.children[bufferCount];
    const b = trackEl.children[bufferCount + 1];
    stride = (a && b) ? (b[offsetProp] - a[offsetProp]) : 0;
  }

  function checkLoop() {
    const count = getItemCount();
    if (!stride || !count) return;
    const headSpan = bufferCount * stride;
    const bodySpan = count * stride;
    const pos = trackEl[scrollProp];
    if (pos < headSpan - stride * (bufferCount - 1)) {
      trackEl[scrollProp] += bodySpan;
      targetScroll += bodySpan;
    } else if (pos > headSpan + bodySpan) {
      trackEl[scrollProp] -= bodySpan;
      targetScroll -= bodySpan;
    }
  }

  function tick() {
    const current = trackEl[scrollProp];
    const diff = targetScroll - current;
    if (Math.abs(diff) < 0.5) {
      trackEl[scrollProp] = targetScroll;
      isEasing = false;
      raf = null;
      checkLoop();
      return;
    }
    trackEl[scrollProp] = current + diff * easeFactor;
    checkLoop();
    raf = requestAnimationFrame(tick);
  }

  trackEl.addEventListener('wheel', (e) => {
    if (Math.abs(e[deltaProp]) <= Math.abs(e[crossDeltaProp])) return;
    e.preventDefault();
    if (axis === 'y') e.stopPropagation();
    lastInteraction = performance.now();
    if (drift) {
      const fast = Math.abs(e[deltaProp]) > fastThreshold;
      driftArmed = fast; // a gentle input clears drift; a fast one re-arms it once it settles
      if (!fast) driftSpeed = 0;
    }
    targetScroll += e[deltaProp];
    isEasing = true;
    if (!raf) raf = requestAnimationFrame(tick);
  }, { passive: false });

  trackEl.addEventListener('scroll', () => {
    if (isEasing || isDrifting) return;
    targetScroll = trackEl[scrollProp];
    checkLoop();
  });

  if (drift) {
    let lastFrameTime = performance.now();
    (function ambient(now) {
      const dt = Math.min(now - lastFrameTime, 50); // clamp so a dropped/backgrounded frame can't cause a jump
      lastFrameTime = now;
      const idleFor = now - lastInteraction;

      if (!isEasing && !paused) {
        const shouldDrift = driftArmed || idleFor > idleMs;
        const targetSpeed = shouldDrift ? driftSpeedTarget : 0;
        driftSpeed += (targetSpeed - driftSpeed) * Math.min(1, dt / 1500);
        if (Math.abs(driftSpeed) > 0.01) {
          isDrifting = true;
          if (driftPos === null) driftPos = trackEl[scrollProp];
          driftPos += driftSpeed * (dt / 1000);
          trackEl[scrollProp] = driftPos;
          targetScroll = driftPos;
          const before = trackEl[scrollProp];
          checkLoop();
          const after = trackEl[scrollProp];
          if (after !== before) driftPos += (after - before); // preserve the fraction, only apply the jump delta
        } else {
          isDrifting = false;
          driftPos = null;
        }
      } else {
        isDrifting = false;
        driftPos = null;
      }
      requestAnimationFrame(ambient);
    })(performance.now());
  }

  return {
    measure,
    resetTo(value) {
      trackEl[scrollProp] = value;
      targetScroll = value;
      lastInteraction = performance.now();
    },
    pause() { paused = true; driftSpeed = 0; driftArmed = false; driftPos = null; isDrifting = false; },
    resume() { paused = false; lastInteraction = performance.now(); }
  };
}

/* Builds `count` items cycling through `list` starting at `start`
   (wrapping around as many times as needed) — used so a short list of
   narrow/small items still gets a wide enough clone buffer to scroll
   freely in both directions before looping. */
function cyclicSlice(list, start, count) {
  const out = [];
  const n = list.length;
  for (let i = 0; i < count; i++) {
    out.push(list[((start + i) % n + n) % n]);
  }
  return out;
}

function renderQuoteLoop(containerEl, quotes, rows) {
  containerEl.innerHTML = '';
  const buffer = Math.max(rows, 6);
  const head = cyclicSlice(quotes, quotes.length - buffer, buffer);
  const tail = cyclicSlice(quotes, 0, buffer);
  const full = [...head, ...quotes, ...tail];
  full.forEach(q => {
    const el = document.createElement('div');
    el.className = 'q';
    el.textContent = `\u201C${q}\u201D`;
    containerEl.appendChild(el);
  });
  const loop = attachLoopScroll(containerEl, buffer, () => quotes.length, { axis: 'y' });
  requestAnimationFrame(() => {
    loop.measure();
    const first = containerEl.children[buffer];
    if (first) loop.resetTo(first.offsetTop);
  });
}

/* =====================================================================
   HALL OF SAINTS — carousel, modal
===================================================================== */
const hallTrack = document.getElementById('hall-track');
const LOOP_BUFFER = 12; /* generous, so fast wheel-flicks never outrun the clone buffer */

function renderHall() {
  hallTrack.innerHTML = '';
  const head = cyclicSlice(SAINTS, SAINTS.length - LOOP_BUFFER, LOOP_BUFFER);
  const tail = cyclicSlice(SAINTS, 0, LOOP_BUFFER);
  const full = [...head, ...SAINTS, ...tail];

  full.forEach((s) => {
    const item = document.createElement('div');
    item.className = 'saint-item';
    item.dataset.id = s.id;
    item.innerHTML = `
      <div class="saint-card"><img src="${encodeURI(s.image)}" alt="${s.name}"></div>
      <div class="saint-caption">${s.name}</div>`;
    item.addEventListener('click', () => openHallModal(item, s));
    hallTrack.appendChild(item);
  });

  requestAnimationFrame(() => {
    hallInertia.measure();
    const first = hallTrack.children[LOOP_BUFFER];
    if (first) hallInertia.resetTo(first.offsetLeft);
  });
}

const hallInertia = attachLoopScroll(hallTrack, LOOP_BUFFER, () => SAINTS.length, { axis: 'x', drift: true });

/* ---- Hall modal ---- */
const hallModalQuotes = document.getElementById('hall-modal-quotes');
const hallModalText = document.getElementById('hall-modal-text');
const hallMobilePanel = document.getElementById('hall-mobile-panel');
const hallClose = document.getElementById('hall-close');

function openHallModal(itemEl, data) {
  hallInertia.pause();
  const rect = itemEl.getBoundingClientRect();
  const mobile = isMobileViewport();

  const placeholder = document.createElement('div');
  placeholder.className = 'item-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(itemEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(itemEl).marginBottom;
  itemEl.after(placeholder);

  hallTrack.querySelectorAll('.saint-item').forEach(el => {
    if (el !== itemEl) el.classList.add('dim');
  });

  itemEl.style.top = rect.top + 'px';
  itemEl.style.left = rect.left + 'px';
  itemEl.style.width = rect.width + 'px';
  itemEl.style.height = rect.height + 'px';
  itemEl.style.transform = 'translate(0px, 0px) scale(1)';
  itemEl.classList.add('selected', 'animate-pos');

  requestAnimationFrame(() => {
    let targetH, targetTop, targetLeft;
    if (mobile) {
      targetH = window.innerHeight * 0.36;
      targetTop = 46;
      const scale0 = targetH / rect.height;
      const targetW0 = rect.width * scale0;
      targetLeft = window.innerWidth * 0.66 - targetW0 / 2; /* rule-of-thirds, right gridline */
    } else {
      targetH = window.innerHeight * 0.62;
      targetTop = (window.innerHeight - targetH) / 2;
      const scale0 = targetH / rect.height;
      const targetW0 = rect.width * scale0;
      targetLeft = (window.innerWidth - targetW0) / 2;
    }
    const scale = targetH / rect.height;
    const dx = targetLeft - rect.left;
    const dy = targetTop - rect.top;
    itemEl.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
  });

  // populate both desktop and mobile panels — only one is visible per breakpoint
  renderQuoteLoop(document.getElementById('hall-quotes-track-desktop'), data.quotes, 7);
  renderQuoteLoop(document.getElementById('hall-quotes-track-mobile'), data.quotes, 3);
  document.getElementById('hall-lorem-desktop').innerHTML = data.vitaParagraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('hall-lorem-mobile').innerHTML = data.vitaParagraphs.map(p => `<p>${p}</p>`).join('');

  setTimeout(() => {
    hallModalQuotes.classList.add('reveal');
    hallModalText.classList.add('reveal');
    hallMobilePanel.classList.add('reveal');
    hallClose.classList.add('show');
  }, 1500);

  hallClose.onclick = () => closeHallModal(itemEl, placeholder);
}

function closeHallModal(itemEl, placeholder) {
  hallInertia.resume(); // 7s idle countdown restarts fresh from now
  hallModalQuotes.classList.remove('reveal');
  hallModalText.classList.remove('reveal');
  hallMobilePanel.classList.remove('reveal');
  hallClose.classList.remove('show');

  itemEl.style.transform = 'translate(0px, 0px) scale(1)';

  setTimeout(() => {
    itemEl.classList.remove('selected', 'animate-pos');
    itemEl.removeAttribute('style');
    placeholder.remove();
    hallTrack.querySelectorAll('.saint-item').forEach(el => el.classList.remove('dim'));
  }, 1500);
}

/* Deterministic JS-driven tween for a single px style property — used
   where CSS class-swap transitions proved unreliable (a transition can
   silently inherit a stale duration/starting-point when its class and
   its target value change in the same tick). */
function animatePx(el, prop, from, to, duration, onComplete) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    el.style[prop] = (from + (to - from) * eased) + 'px';
    if (t < 1) {
      requestAnimationFrame(step);
    } else if (onComplete) {
      onComplete();
    }
  }
  requestAnimationFrame(step);
}

/* =====================================================================
   ARMORY — vertical "spear" quotes, modal
===================================================================== */
const armoryTrack = document.getElementById('armory-track');
const armoryAttribution = document.getElementById('armory-attribution');
const armoryClose = document.getElementById('armory-close');
const ARMORY_BUFFER = 24;

function renderArmory() {
  armoryTrack.innerHTML = '';
  const head = cyclicSlice(QUOTES, QUOTES.length - ARMORY_BUFFER, ARMORY_BUFFER);
  const tail = cyclicSlice(QUOTES, 0, ARMORY_BUFFER);
  const full = [...head, ...QUOTES, ...tail];

  full.forEach((q) => {
    const el = document.createElement('div');
    el.className = 'spear';
    el.innerHTML = `
      <div class="hilt"><div class="pommel"></div><div class="grip"></div><div class="guard"></div></div>
      <div class="shaft-text">${q.quote}</div>`;
    el.addEventListener('click', () => openArmoryModal(el, q));
    armoryTrack.appendChild(el);
  });

  requestAnimationFrame(() => {
    armoryInertia.measure();
    const first = armoryTrack.children[ARMORY_BUFFER];
    if (first) armoryInertia.resetTo(first.offsetLeft);
  });
}

const armoryInertia = attachLoopScroll(armoryTrack, ARMORY_BUFFER, () => QUOTES.length, { axis: 'x', drift: true });

function openArmoryModal(spearEl, q) {
  armoryInertia.pause();
  const rect = spearEl.getBoundingClientRect();

  const placeholder = document.createElement('div');
  placeholder.className = 'spear-placeholder';
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.marginTop = getComputedStyle(spearEl).marginTop;
  placeholder.style.marginBottom = getComputedStyle(spearEl).marginBottom;
  spearEl.after(placeholder);

  armoryTrack.querySelectorAll('.spear').forEach(el => {
    if (el !== spearEl) el.classList.add('dim');
  });

  spearEl.style.top = rect.top + 'px';
  spearEl.style.left = rect.left + 'px';
  spearEl.style.width = rect.width + 'px';
  spearEl.style.height = rect.height + 'px';
  spearEl.style.transform = 'rotate(0deg) scale(1)';
  spearEl.classList.add('selected', 'animate-pos');

  requestAnimationFrame(() => {
    // width/height never change — the spear keeps its own proportions
    // and is carried to centre, enlarged 1.5x, and laid flat by rotating.
    // On narrow (mobile) screens the scale is capped with a 12px buffer
    // on each side so the laid-flat blade never runs off screen.
    const desiredScale = 1.5;
    const maxAllowed = (window.innerWidth - 24) / rect.height;
    const scale = Math.min(desiredScale, maxAllowed);

    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2 - 30;
    spearEl.style.top = (cy - rect.height / 2) + 'px';
    spearEl.style.left = (cx - rect.width / 2) + 'px';
    spearEl.style.transform = `rotate(-90deg) scale(${scale})`;
    armoryAttribution.style.top = (cy + (rect.width * scale) / 2 + 26) + 'px';
    armoryAttribution.style.left = '50%';
  });

  const isSaint = SAINTS.some(s => s.name.toLowerCase() === q.source.toLowerCase());
  let html;
  if (isSaint) {
    html = `&mdash; <a href="#" data-jump-saint="${q.source}">${q.source}</a>`;
  } else {
    const url = `https://www.biblegateway.com/passage/?search=${encodeURIComponent(q.source)}`;
    html = `&mdash; <a href="${url}" target="_blank" rel="noopener">${q.source}</a>`;
  }
  armoryAttribution.innerHTML = html;

  setTimeout(() => {
    armoryAttribution.classList.add('reveal');
    armoryClose.classList.add('show');
  }, 1500);

  const jumpLink = armoryAttribution.querySelector('[data-jump-saint]');
  if (jumpLink) {
    jumpLink.onclick = (e) => {
      e.preventDefault();
      closeArmoryModal(spearEl, placeholder);
      document.querySelector('header nav a[data-view="hall"]').click();
      const target = SAINTS.find(s => s.name.toLowerCase() === q.source.toLowerCase());
      if (target) {
        setTimeout(() => {
          const itemEl = [...hallTrack.querySelectorAll('.saint-item')]
            .find(el => Number(el.dataset.id) === target.id);
          if (itemEl) openHallModal(itemEl, target);
        }, 200);
      }
    };
  }

  armoryClose.onclick = () => closeArmoryModal(spearEl, placeholder);
}

/* Close: an exact reverse of the open animation (rotate + scale + slide
   back), overshooting to a spot 30px above the true resting place — but
   1.5x quicker than the open animation. The fade-in of the rest of the
   rack overlaps the rotation instead of waiting for it. Once that's
   underway, a second, 1.2x-quicker animation slots the spear the final
   30px down into its exact original position. */
function closeArmoryModal(spearEl, placeholder) {
  armoryInertia.resume(); // 7s idle countdown restarts fresh from now
  armoryAttribution.classList.remove('reveal');
  armoryClose.classList.remove('show');

  const rect = placeholder.getBoundingClientRect();

  // Step 1 — reverse of the open animation (faster: 'closing' overrides
  // the 1.5s open transition with a 1s one), overshooting 30px high.
  // Force a reflow between the class swap and the value change so the
  // browser can't carry over a stale transition state into this step.
  spearEl.classList.add('closing');
  void spearEl.offsetHeight;
  spearEl.style.top = (rect.top - 30) + 'px';
  spearEl.style.left = rect.left + 'px';
  spearEl.style.transform = 'rotate(0deg) scale(1)';

  // Step 2 — the rest of the rack fades back in, overlapping step 1.
  armoryTrack.querySelectorAll('.spear').forEach(el => {
    if (el !== spearEl) el.classList.remove('dim');
  });

  setTimeout(() => {
    // Step 3 — the spear slots smoothly down the final 30px. Driven
    // directly in JS (not a CSS transition) so it can't inherit any
    // stale state from step 1 — that mismatch was the mid-animation stall.
    spearEl.classList.remove('closing', 'animate-pos');
    const fromTop = rect.top - 30;
    animatePx(spearEl, 'top', fromTop, rect.top, 417, () => {
      spearEl.classList.remove('selected');
      spearEl.removeAttribute('style');
      placeholder.remove();
    });
  }, 1500);
}

/* =====================================================================
   INIT — load quotes.txt, fall back to embedded placeholder text
===================================================================== */
fetch('assets/text/quotes.txt')
  .then(r => { if (!r.ok) throw new Error('no file'); return r.text(); })
  .then(text => { QUOTES = parseQuotes(text); })
  .catch(() => { QUOTES = parseQuotes(QUOTES_FALLBACK); })
  .finally(() => {
    renderHall();
    renderArmory();
  });

window.addEventListener('resize', () => {
  hallInertia.measure();
  armoryInertia.measure();
});
</script>
